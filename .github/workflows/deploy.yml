name: Build & Deploy Spring Boot

on:
  push:
    branches:
      - main

# Permissions requises pour publier l'image sur GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java & Configurer le cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compiler
        run: mvn clean package -DskipTests

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les métadonnées Docker (Gestion de la casse et du tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Construire et publier l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Déployer sur le serveur
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Conversion du nom d'image en minuscules pour la commande docker pull sur le serveur
            IMAGE_URL=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            docker pull $IMAGE_URL:latest

            docker stop spring-app || true
            docker rm spring-app || true

            docker run -d \
              --name spring-app \
              --restart always \
              -p 127.0.0.1:9080:9080 \
              $IMAGE_URL:latest

            docker image prune -af
