name: Build & Deploy Spring Boot (GHCR)

on:
  push:
    branches:
      - main

# Permission requise pour publier des packages sur GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java & Configurer le cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compiler
        run: mvn clean package -DskipTests

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige des noms d'images strictement en minuscules
      - name: Définir le nom de l'image en minuscules
        run: |
          echo "IMAGE_URL=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Construire et publier l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Déployer sur le serveur
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Transformation en minuscules pour l'URL sur le serveur
            IMAGE_URL=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            docker pull $IMAGE_URL:latest

            docker stop spring-app || true
            docker rm spring-app || true

            docker run -d \
              --name spring-app \
              --restart always \
              -p 127.0.0.1:9080:9080 \
              $IMAGE_URL:latest

            docker image prune -af